name: Arbor Impact Analysis
description: Run Arbor graph-native code impact analysis in GitHub Actions.
branding:
  icon: git-branch
  color: blue

inputs:
  command:
    description: Arbor command to run (without leading 'arbor'). Supports 'analyze-impact --pr=NNN' for PR Bot blast radius using graph centrality.
    required: false
    default: status .
  arbor-version:
    description: Arbor CLI version to install (e.g. 2.0.0). Use 'latest' for newest.
    required: false
    default: latest
  install-from-source:
    description: Install from this repository source using Cargo instead of crates.io.
    required: false
    default: "false"
  working-directory:
    description: Directory where the Arbor command should run.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install Arbor CLI
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.install-from-source }}" == "true" ]]; then
          cargo install --path crates/arbor-cli --force
        elif [[ "${{ inputs.arbor-version }}" == "latest" ]]; then
          cargo install arbor-graph-cli --force
        else
          cargo install arbor-graph-cli --version "${{ inputs.arbor-version }}" --force
        fi

    - name: Run Arbor command (with PR Bot support)
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.working-directory }}"
        if [[ "${{ inputs.command }}" == *"analyze-impact"* ]]; then
          if arbor ${{ inputs.command }} --format markdown > arbor-impact.md 2>/tmp/arbor-impact.err; then
            echo "Generated markdown impact report."
          elif arbor ${{ inputs.command }} > arbor-impact.md 2>/tmp/arbor-impact.err; then
            echo "Generated text impact report (markdown flag unsupported by this command)."
          else
            {
              echo "## 🧠 Arbor Graph Impact Report"
              echo
              echo "Unable to generate impact report."
              echo
              echo "Command: \`${{ inputs.command }}\`"
              echo
              echo "stderr:"
              echo '\`\`\`'
              cat /tmp/arbor-impact.err || true
              echo '\`\`\`'
            } > arbor-impact.md
            echo "::warning::Arbor impact analysis failed; wrote fallback report to arbor-impact.md."
          fi
        else
          arbor ${{ inputs.command }}
        fi