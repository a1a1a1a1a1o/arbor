services:
  arbor-dev:
    image: rust:1.85-slim
    container_name: arbor-dev
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - arbor-target:/workspace/target
    command: >
      bash -lc "
      apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates git &&
      cargo build &&
      cargo test
      "

  arbor-bridge:
    build: .
    container_name: arbor-bridge
    stdin_open: true
    volumes:
      - ./:/workspace
    working_dir: /workspace

volumes:
  cargo-registry:
  cargo-git:
  arbor-target:
