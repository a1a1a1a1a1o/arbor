name: Set Repository Topics

on:
  workflow_dispatch:

permissions:
  contents: read
  administration: write

jobs:
  set-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Set repository topics
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const topics = [
              'code-analysis',
              'ast',
              'tree-sitter',
              'developer-tools',
              'rust',
              'mcp',
              'model-context-protocol',
              'visualization',
              'graph',
              'ai-tools',
              'static-analysis',
              'code-intelligence',
              'code-navigation',
              'vscode',
              'cli',
              'impact-analysis',
              'dependency-graph',
              'refactoring',
              'open-vsx',
              'homebrew'
            ];

            try {
              await github.rest.repos.replaceAllTopics({
                owner: context.repo.owner,
                repo: context.repo.repo,
                names: topics,
              });

              core.summary
                .addHeading('Repository topics updated')
                .addRaw(topics.join(', '))
                .write();
            } catch (error) {
              core.warning(`Unable to update repository topics: ${error.message}`);
              core.notice('Skipping topic update so the workflow stays green.');
            }