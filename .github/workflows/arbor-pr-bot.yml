name: Arbor PR Bot - Blast Radius & Governance

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  arbor-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For full git history/impact

      - name: Run Arbor PR Impact Analysis
        uses: ./
        with:
          command: analyze-impact --pr=${{ github.event.pull_request.number }}
          install-from-source: true
          working-directory: .

      - name: Post Blast Radius Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'arbor-impact.md';
            const fallback = [
              '## 🧠 Arbor Graph Impact Report',
              '',
              'Impact report file was not generated in this run.',
              '',
              `Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              'Likely cause: Arbor analysis step failed before writing markdown output.',
              'Check the **Run Arbor PR Impact Analysis** step logs for details.'
            ].join('\n');

            const impact = fs.existsSync(reportPath)
              ? (fs.readFileSync(reportPath, 'utf8') || fallback)
              : fallback;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧠 Arbor Graph Impact Report\n\n**Blast Radius:** High-centrality nodes affected?\n\n${impact}\n\n*Powered by Arbor graph governance for code. See https://github.com/Anandb71/arbor for details.*`
            });
