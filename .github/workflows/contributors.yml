name: Update Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: contributors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Update contributors block in README
        shell: pwsh
        run: ./scripts/update_contributors.ps1 -Repo "${{ github.repository }}" -ReadmePath "README.md" -MaxContributors 15

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: docs(readme): refresh contributors list
          branch: chore/refresh-contributors
          base: main
          title: docs(readme): refresh contributors list
          body: |
            Automated contributors refresh.

            This PR is generated by the contributors workflow to keep the README contributor block current.
          delete-branch: true
          add-paths: |
            README.md