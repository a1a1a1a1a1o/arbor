name: Publish VS Code Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version bump (patch | minor | major | x.y.z). Leave empty to publish current package.json version."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-vscode-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish extension registries
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: extensions/arbor-vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extensions/arbor-vscode/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Install publish CLIs
        run: npm install -g @vscode/vsce ovsx

      - name: Resolve publish version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "${{ github.event_name }}" = "release" ] && echo "$RELEASE_TAG" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION="${RELEASE_TAG#v}"
          else
            VERSION=""
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION" ]; then
            echo "Using extension version: $VERSION"
          else
            echo "Using current package.json extension version"
          fi

      - name: Apply release version to package.json
        if: steps.version.outputs.version != ''
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Package extension artifact
        run: vsce package --out arbor-vscode.vsix

      - name: Validate publishing token presence
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ] && [ -z "$OVSX_PAT" ]; then
            echo "No publish token found. Add VSCE_PAT and/or OVSX_PAT in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT not set; skipping VS Code Marketplace publish."
            exit 0
          fi

          vsce publish --packagePath arbor-vscode.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT not set; skipping Open VSX publish."
            exit 0
          fi

          PUBLISHER="$(node -p "require('./package.json').publisher")"
          echo "Ensuring Open VSX namespace '$PUBLISHER' exists..."
          ovsx create-namespace "$PUBLISHER" --pat "$OVSX_PAT" || true

          # Publish the same packaged artifact to Open VSX.
          ovsx publish arbor-vscode.vsix --pat "$OVSX_PAT"