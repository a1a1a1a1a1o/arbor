name: Publish NPM Wrapper

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package metadata
        working-directory: packaging/npm
        run: |
          npm pkg get name version

      - name: Resolve publish version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VALUE="${{ github.event.release.tag_name }}"
            VALUE="${VALUE#v}"

            if echo "$VALUE" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "value=$VALUE" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            else
              echo "value=" >> "$GITHUB_OUTPUT"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Skipping npm publish because release tag '$VALUE' is not a 3-part npm semver version."
            fi
          else
            echo "value=" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply release version to npm package
        if: steps.version.outputs.value != ''
        working-directory: packaging/npm
        run: npm version "${{ steps.version.outputs.value }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        if: steps.version.outputs.skip != 'true'
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set; skipping publish."
            exit 0
          fi

          npm publish --access public