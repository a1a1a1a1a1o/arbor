name: Flutter CI

on:
  push:
    branches: [main, "release/**"]
    paths:
      - "visualizer/**"
  pull_request:
    branches: [main]
    paths:
      - "visualizer/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze and test (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: visualizer
        run: flutter pub get

      - name: Analyze
        working-directory: visualizer
        run: flutter analyze

      - name: Test
        working-directory: visualizer
        run: flutter test

  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    needs: analyze-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: visualizer
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        working-directory: visualizer
        run: flutter build ${{ matrix.platform }}
