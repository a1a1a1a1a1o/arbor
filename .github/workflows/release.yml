name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional explicit release tag (e.g. v1.8.0)."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG#v}"

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "Invalid semver tag/version resolved: TAG=$TAG VERSION=$VERSION"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: arbor-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: arbor-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: arbor-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: arbor-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: arbor-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Install Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p arbor-graph-cli

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/arbor" "dist/arbor"
          chmod +x dist/arbor
          tar -C dist -czf "${{ matrix.artifact }}.tar.gz" arbor

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/arbor.exe" "dist/arbor.exe"
          Compress-Archive -Path "dist/arbor.exe" -DestinationPath "${{ matrix.artifact }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish-crates:
    name: Publish crates to crates.io
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libgtk-3-dev libfontconfig1-dev libasound2-dev libdbus-1-dev libssl-dev cmake

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish."
            exit 0
          fi

          crates=(
            arbor-core
            arbor-graph
            arbor-watcher
            arbor-server
            arbor-mcp
            arbor-graph-cli
            arbor-gui
          )

          for crate in "${crates[@]}"; do
            echo "Publishing ${crate}..."
            if cargo publish -p "${crate}" --allow-dirty; then
              echo "Published ${crate}"
            else
              echo "Warning: publish failed for ${crate} (may already exist). Continuing."
            fi
            sleep 20
          done

  release:
    name: Create GitHub Release
    needs: [prepare, build, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Gather release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ needs.prepare.outputs.tag }}'
          VERSION='${{ needs.prepare.outputs.version }}'

          cat > release-notes.md <<EOF
          ## Arbor ${TAG}

          ### Installation

          \`\`\`bash
          # Cargo
          cargo install arbor-graph-cli --version ${VERSION}

          # Homebrew (macOS/Linux)
          brew install Anandb71/tap/arbor

          # Scoop (Windows)
          scoop bucket add arbor https://github.com/Anandb71/arbor
          scoop install arbor

          # npm
          npx @anandb71/arbor-cli

          # Docker
          docker pull ghcr.io/anandb71/arbor:${TAG}
          \`\`\`

          ### Assets

          | Platform | Architecture | File |
          |----------|-------------|------|
          | Linux | x86_64 | \`arbor-linux-x86_64.tar.gz\` |
          | Linux | aarch64 | \`arbor-linux-aarch64.tar.gz\` |
          | macOS | x86_64 | \`arbor-macos-x86_64.tar.gz\` |
          | macOS | Apple Silicon | \`arbor-macos-aarch64.tar.gz\` |
          | Windows | x86_64 | \`arbor-windows-x86_64.zip\` |
          EOF

      - name: Create/Update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          body_path: release-notes.md
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          append_body: true

  update-checksums:
    name: Update Homebrew & Scoop checksums
    needs: [prepare, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update package manager manifests
        shell: bash
        run: |
          set -euo pipefail

          VERSION='${{ needs.prepare.outputs.version }}'

          MAC_X64_SHA=$(sha256sum artifacts/arbor-macos-x86_64/arbor-macos-x86_64.tar.gz | cut -d' ' -f1)
          MAC_ARM_SHA=$(sha256sum artifacts/arbor-macos-aarch64/arbor-macos-aarch64.tar.gz | cut -d' ' -f1)
          LINUX_X64_SHA=$(sha256sum artifacts/arbor-linux-x86_64/arbor-linux-x86_64.tar.gz | cut -d' ' -f1)
          LINUX_ARM_SHA=$(sha256sum artifacts/arbor-linux-aarch64/arbor-linux-aarch64.tar.gz | cut -d' ' -f1)
          WIN_X64_SHA=$(sha256sum artifacts/arbor-windows-x86_64/arbor-windows-x86_64.zip | cut -d' ' -f1)

          FILE="packaging/homebrew/arbor.rb"
          SCOOP="packaging/scoop/arbor.json"

          sed -i "s|version \".*\"|version \"${VERSION}\"|" "$FILE"
          sed -i "/arbor-macos-aarch64.tar.gz/!b;n;s|sha256 \".*\"|sha256 \"${MAC_ARM_SHA}\"|" "$FILE"
          sed -i "/arbor-macos-x86_64.tar.gz/!b;n;s|sha256 \".*\"|sha256 \"${MAC_X64_SHA}\"|" "$FILE"
          sed -i "/arbor-linux-aarch64.tar.gz/!b;n;s|sha256 \".*\"|sha256 \"${LINUX_ARM_SHA}\"|" "$FILE"
          sed -i "/arbor-linux-x86_64.tar.gz/!b;n;s|sha256 \".*\"|sha256 \"${LINUX_X64_SHA}\"|" "$FILE"

          sed -i "s|\"version\": \".*\"|\"version\": \"${VERSION}\"|" "$SCOOP"
          sed -i "s|\"hash\": \".*\"|\"hash\": \"${WIN_X64_SHA}\"|" "$SCOOP"

      - name: Commit and push manifest updates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add packaging/homebrew/arbor.rb packaging/scoop/arbor.json
          if git diff --cached --quiet; then
            echo "No manifest updates required."
            exit 0
          fi

          git commit -m "chore: update manifests for v${{ needs.prepare.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main || echo "::warning::Could not push to main (possibly branch protection)."