name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: arbor.exe
            asset_name: arbor-windows-x64.exe

          # Linux AMD64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: arbor
            asset_name: arbor-linux-x64

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: arbor
            asset_name: arbor-linux-arm64

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: arbor
            asset_name: arbor-macos-x64

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: arbor
            asset_name: arbor-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p arbor-graph-cli

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish-crates:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crates.io token is available
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is missing. Add it in repository secrets to publish crates."
            exit 1
          fi

      - name: Publish crates (skip already-published versions)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_VERSION#v}"
          CRATES=(
            "arbor-core"
            "arbor-graph"
            "arbor-watcher"
            "arbor-server"
            "arbor-mcp"
            "arbor-gui"
            "arbor-graph-cli"
          )

          for crate in "${CRATES[@]}"; do
            echo "Checking crates.io for ${crate} ${VERSION}"
            if curl -fsSL "https://crates.io/api/v1/crates/${crate}/${VERSION}" > /dev/null 2>&1; then
              echo "${crate} ${VERSION} already published. Skipping."
              continue
            fi

            echo "Publishing ${crate} ${VERSION}"
            cargo publish -p "${crate}" --locked
            sleep 20
          done

  create-release:
    name: Create GitHub Release
    needs: [build-cli, publish-crates]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/arbor-windows-x64.exe/arbor-windows-x64.exe
            artifacts/arbor-linux-x64/arbor-linux-x64
            artifacts/arbor-linux-arm64/arbor-linux-arm64
            artifacts/arbor-macos-x64/arbor-macos-x64
            artifacts/arbor-macos-arm64/arbor-macos-arm64
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
